<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary SEO -->
    <title>TalentGraph — AI Career Path & Skill Mapping Platform</title>
    <meta name="description" content="TalentGraph is an AI-powered career platform that helps you map your skills, analyze gaps, and plan your future career path with actionable insights." />
    <meta name="keywords" content="AI career, career path, skill mapping, job analysis, TalentGraph" />
    <meta name="author" content="TalentGraph" />
    <link rel="canonical" href="https://talentgraph.xyz/" />

    <!-- Favicon (Google-friendly) -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <!-- PWA -->
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#0f172a">

    <!-- Open Graph (Social Media) -->
    <meta property="og:title" content="TalentGraph — AI Career Platform">
    <meta property="og:description" content="Analyze your skills, discover career paths, and grow faster with AI-powered insights.">
    <meta property="og:image" content="https://talentgraph.xyz/logo.png">
    <meta property="og:url" content="https://talentgraph.xyz/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="TalentGraph">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TalentGraph — AI Career Platform">
    <meta name="twitter:description" content="Discover your future career with AI-powered insights.">
    <meta name="twitter:image" content="https://talentgraph.xyz/logo.png">

    <!-- Structured Data (IMPORTANT for Google logo) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TalentGraph",
      "url": "https://talentgraph.xyz",
      "logo": "https://talentgraph.xyz/logo.png",
      "sameAs": [
        "https://linkedin.com",
        "https://twitter.com"
      ]
    }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
